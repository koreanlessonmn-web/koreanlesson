      {k:"일찍",m:"Эрт"},{k:"책을 읽다",m:"Ном унших"},
      {k:"축구",m:"Хөл бөмбөг"},{k:"춤을 추다",m:"Бүжиглэх"},
      {k:"치다",m:"Цохих"},{k:"피곤하다",m:"Ядрах"}
    ]
  }
];

var ST={done:JSON.parse(localStorage.getItem('kd')||'[]'),xp:parseInt(localStorage.getItem('kx')||'0')};
var CL=null,MS={};

function save(){localStorage.setItem('kd',JSON.stringify(ST.done));localStorage.setItem('kx',ST.xp);}
function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goHome(){renderHome();show('home');}

function renderHome(){
  var tot=LESSONS.length,dn=ST.done.length;
  document.getElementById('pbf').style.width=Math.round(dn/tot*100)+'%';
  document.getElementById('pbt').textContent=dn+' / '+tot+' хичээл дууссан';
  var lc=document.getElementById('lc');
  lc.innerHTML='';
  LESSONS.forEach(function(les){
    var isDone=ST.done.indexOf(les.id)>=0;
    var gameLabel=les.game==='match'?'🔗 Matching Game':'🎯 Multiple Choice';
    var card=document.createElement('div');
    card.className='les-card';
    card.style.background='linear-gradient(135deg,'+les.color+','+les.color+'bb)';
    card.innerHTML=
      '<div class="lc-top">'+
        '<div class="lc-icon">'+les.icon+'</div>'+
        '<div class="lc-info">'+
          '<div class="lc-num">'+les.id+'-р хичээл · '+gameLabel+'</div>'+
          '<div class="lc-title">'+les.sub+'</div>'+
          '<div class="lc-count">📝 '+les.w.length+' үг</div>'+
        '</div>'+
        '<div class="lc-status">'+(isDone?'✅':'▶️')+'</div>'+
      '</div>'+
      '<button class="lc-btn">'+(isDone?'🔄 Дахин тоглох':'▶️ Эхлэх')+'</button>';
    card.querySelector('.lc-btn').onclick=function(e){e.stopPropagation();startL(les.id);};
    card.onclick=function(){startL(les.id);};
    lc.appendChild(card);
  });
}

// ══ MATCHING GAME ══
var RPR=4;
function startMatch(){
  document.getElementById('mg').style.display='flex';
  document.getElementById('mcg').style.display='none';
  MS.p=shuf(CL.w.slice());
  MS.mat=0;MS.tot=CL.w.length;MS.wr=0;MS.ri=0;MS.rm=0;MS.rt=0;
  updLP();renderR();
}

function getRPairs(){return MS.p.slice(MS.ri*RPR,MS.ri*RPR+RPR);}

function renderR(){
  var pairs=getRPairs();
  if(!pairs.length){finish();return;}
  var ks=shuf(pairs.map(function(p){return p.k;}));
  var ms=shuf(pairs.map(function(p){return p.m;}));
  document.getElementById('ck').innerHTML='';
  document.getElementById('cm').innerHTML='';
  MS.sk=null;MS.sm=null;MS.rm=0;MS.rt=pairs.length;
  var tr=Math.ceil(MS.p.length/RPR);
  document.getElementById('ri').textContent=(MS.ri+1)+' / '+tr+' дугаар';
  ks.forEach(function(k){
    var el=document.createElement('div');
    el.className='mcard';el.textContent=k;el.dataset.v=k;el.dataset.t='k';
    el.onclick=function(){selM(el,'k');};
    document.getElementById('ck').appendChild(el);
  });
  ms.forEach(function(m){
    var el=document.createElement('div');
    el.className='mcard';el.textContent=m;el.dataset.v=m;el.dataset.t='m';
    el.onclick=function(){selM(el,'m');};
    document.getElementById('cm').appendChild(el);
  });
}

function selM(el,t){
  if(el.classList.contains('ok'))return;
  if(t==='k'){document.querySelectorAll('[data-t="k"].sel').forEach(function(e){e.classList.remove('sel');});MS.sk=el;el.classList.add('sel');}
  else{document.querySelectorAll('[data-t="m"].sel').forEach(function(e){e.classList.remove('sel');});MS.sm=el;el.classList.add('sel');}
  if(MS.sk&&MS.sm)chkM();
}

function chkM(){
  var ke=MS.sk,me=MS.sm,kv=ke.dataset.v,mv=me.dataset.v;
  var pair=null;CL.w.forEach(function(w){if(w.k===kv)pair=w;});
  if(pair&&pair.m===mv){
    ke.classList.remove('sel');me.classList.remove('sel');
    ke.classList.add('ok');me.classList.add('ok');
    MS.mat++;MS.rm++;updLP();
    if(MS.rm===MS.rt)setTimeout(function(){MS.ri++;renderR();},650);
  } else {
    MS.wr++;ke.classList.add('err');me.classList.add('err');
    setTimeout(function(){ke.classList.remove('err','sel');me.classList.remove('err','sel');},500);
  }
  MS.sk=null;MS.sm=null;
}

// ══ MULTIPLE CHOICE GAME ══
function startChoice(){
  document.getElementById('mg').style.display='none';
  document.getElementById('mcg').style.display='flex';
  MS.qs=shuf(CL.w.slice());
  MS.qi=0;MS.mat=0;MS.tot=CL.w.length;MS.wr=0;
  renderQ();
}

function renderQ(){
  if(MS.qi>=MS.qs.length){finish();return;}
  var q=MS.qs[MS.qi];
  document.getElementById('mc-prog').textContent=(MS.qi+1)+' / '+MS.qs.length+' асуулт';
  document.getElementById('mc-q').textContent=q.k;
  document.getElementById('mc-hint').textContent='';
  updLP();

  // 4 хариулт үүсгэнэ: 1 зөв + 3 буруу
  var wrongs=shuf(CL.w.filter(function(w){return w.k!==q.k;})).slice(0,3);
  var opts=shuf([q].concat(wrongs));

  var container=document.getElementById('mc-opts');
  container.innerHTML='';
  opts.forEach(function(opt){
    var btn=document.createElement('div');
    btn.className='mc-opt';
    btn.textContent=opt.m;
    btn.onclick=function(){
      if(opt.m===q.m){
        btn.classList.add('correct');
        MS.mat++;
        setTimeout(function(){MS.qi++;renderQ();},700);
      } else {
        btn.classList.add('wrong');
        MS.wr++;
        // Зөв хариултыг харуулна
        container.querySelectorAll('.mc-opt').forEach(function(b){
          if(b.textContent===q.m)b.classList.add('correct');
          else if(!b.classList.contains('wrong'))b.classList.add('disabled');
        });
        setTimeout(function(){MS.qi++;renderQ();},1200);
      }
    };
    container.appendChild(btn);
  });
}

function updLP(){
  var pct=Math.round(MS.mat/MS.tot*100);
  document.getElementById('lpfill').style.width=pct+'%';
  document.getElementById('lptext').textContent=MS.mat+' / '+MS.tot+(CL.game==='match'?' холбосон':' зөв хариулт');
}

function startL(lid){
  CL=null;LESSONS.forEach(function(l){if(l.id===lid)CL=l;});
  if(!CL)return;
  MS={t0:Date.now(),mat:0,tot:CL.w.length,wr:0};
  document.getElementById('ltitle').textContent=CL.title;
  document.getElementById('xpb').textContent='⭐ '+CL.xp+' XP';
  updLP();show('lesson');
  if(CL.game==='match')startMatch();
  else startChoice();
}

function finish(){
  var el=Math.round((Date.now()-MS.t0)/1000);
  if(ST.done.indexOf(CL.id)<0){ST.done.push(CL.id);ST.xp+=CL.xp;save();}
  document.getElementById('csub').textContent=CL.title+' дууслаа!';
  document.getElementById('sxp').textContent='+'+CL.xp;
  document.getElementById('smt').textContent=MS.mat+'/'+MS.tot;
  document.getElementById('stm').textContent=el+'с';
  show('complete');confetti();
}

function nextLesson(){
  var ids=LESSONS.map(function(l){return l.id;}),idx=ids.indexOf(CL.id);
  if(idx<ids.length-1)startL(ids[idx+1]); else goHome();
}

function confetti(){
  var w=document.getElementById('cfw');w.innerHTML='';
  var c=['#FF3B30','#FF9500','#FFCC00','#34C759','#007AFF','#AF52DE'];
  for(var i=0;i<55;i++){
    var el=document.createElement('div');el.className='cfp';
    el.style.cssText='left:'+Math.random()*100+'%;background:'+c[Math.floor(Math.random()*c.length)]+';animation-delay:'+Math.random()*0.8+'s;animation-duration:'+(1.5+Math.random())+'s;width:'+(6+Math.random()*8)+'px;height:'+(6+Math.random()*8)+'px';
    w.appendChild(el);
  }
  setTimeout(function(){w.innerHTML='';},3500);
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
renderHome();
</script>
</body>
