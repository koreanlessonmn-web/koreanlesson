<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>한국어 — Солонгос хэл</title>
<style>
:root{
  --red:#FF3B30;--orange:#FF9500;--yellow:#FFCC00;--green:#34C759;
  --blue:#007AFF;--purple:#AF52DE;--bg:#F2F2F7;--card:#fff;
  --text:#1C1C1E;--text2:#6C6C70;--border:#E5E5EA;--radius:20px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
#home{background:linear-gradient(160deg,#1C1C2E,#2D1B69,#1a1a2e);padding:60px 20px 40px}
#home.active{display:block}
#lesson{background:var(--bg);overflow-y:auto}
#complete{background:linear-gradient(160deg,#1C1C2E,#0D3349);align-items:center;justify-content:center;text-align:center;padding:40px 20px}

/* HOME */
.home-header{text-align:center;margin-bottom:36px}
.flag{font-size:60px;display:block;margin-bottom:12px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
h1{font-size:28px;font-weight:900;color:#fff}
.sub{font-size:14px;color:rgba(255,255,255,0.55);margin-top:6px}
.pb-wrap{background:rgba(255,255,255,0.1);border-radius:100px;height:8px;margin:20px 0 6px;overflow:hidden}
.pb-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));border-radius:100px;transition:width .6s}
.pb-text{font-size:13px;color:rgba(255,255,255,0.45);text-align:center;margin-bottom:20px}
.lessons{display:flex;flex-direction:column;gap:14px}
.les-card{border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:transform .15s}
.les-card:active{transform:scale(0.97)}
.lc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.lc-icon{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.lc-info{flex:1}
.lc-num{font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:2px}
.lc-title{font-size:17px;font-weight:900;color:#fff}
.lc-count{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}
.lc-status{font-size:22px}
.lc-btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;background:rgba(255,255,255,0.22);color:#fff;font-family:inherit}
.lc-btn:active{opacity:0.75}

/* LESSON TOP BAR */
.ltb{display:flex;align-items:center;gap:10px;padding:50px 16px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.bbtn{width:36px;height:36px;border:none;background:var(--bg);border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue);font-weight:700;flex-shrink:0}
.linfo{flex:1;min-width:0}
.lname{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lptext{font-size:11px;color:var(--text2);margin-top:2px}
.xpb{background:var(--yellow);color:#000;font-size:11px;font-weight:800;padding:4px 10px;border-radius:100px;flex-shrink:0}
.lpbar{height:4px;background:var(--border);flex-shrink:0}
.lpfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .4s}

/* GAME PANELS */
.gpanel{flex:1;padding:16px;display:none;flex-direction:column;gap:12px;overflow-y:auto}
.gpanel.active{display:flex}

/* MATCH */
.gi{text-align:center;font-size:14px;font-weight:700;color:var(--text2);padding:4px}
.ri{text-align:center;font-size:12px;color:var(--text2);margin-bottom:4px}
.mcols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mcol{display:flex;flex-direction:column;gap:8px}
.mcard{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .18s;font-size:13px;font-weight:700;color:var(--text);min-height:50px;display:flex;align-items:center;justify-content:center;line-height:1.3;word-break:keep-all;user-select:none}
.mcard.sel{border-color:var(--blue);background:rgba(0,122,255,0.08);color:var(--blue)}
.mcard.ok{border-color:var(--green);background:rgba(52,199,89,0.1);color:var(--green);pointer-events:none}
.mcard.err{border-color:var(--red);background:rgba(255,59,48,0.08);color:var(--red);animation:sh .3s}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* CHOICE */
.mc-prog{text-align:center;font-size:13px;color:var(--text2)}
.mc-card{background:var(--card);border-radius:18px;padding:24px 16px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.mc-q{font-size:30px;font-weight:900;color:var(--text);margin-bottom:6px;word-break:keep-all}
.mc-hint{font-size:13px;color:var(--text2)}
.mc-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc-opt{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;font-size:13px;font-weight:700;color:var(--text);min-height:52px;display:flex;align-items:center;justify-content:center;word-break:keep-all;user-select:none}
.mc-opt.correct{border-color:var(--green);background:rgba(52,199,89,0.1);color:var(--green);pointer-events:none}
.mc-opt.wrong{border-color:var(--red);background:rgba(255,59,48,0.1);color:var(--red);pointer-events:none;animation:sh .3s}
.mc-opt.dim{pointer-events:none;opacity:0.45}

/* TYPER */
.tp-prog{text-align:center;font-size:13px;color:var(--text2)}
.tp-card{background:var(--card);border-radius:18px;padding:24px 16px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.tp-mn{font-size:20px;font-weight:900;color:var(--text);margin-bottom:14px;word-break:keep-all}
.tp-disp{font-size:28px;font-weight:900;letter-spacing:3px;min-height:40px;color:var(--blue)}
.tp-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.tp-btn{padding:12px 16px;font-size:20px;font-weight:900;border:2px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer;font-family:inherit;min-width:50px;transition:all .15s;color:var(--text)}
.tp-btn:disabled{opacity:0.4;cursor:default}

/* COMPLETE */
.ce{font-size:72px;margin-bottom:20px}
.ct{font-size:28px;font-weight:900;color:#fff;margin-bottom:8px}
.cs{font-size:15px;color:rgba(255,255,255,0.55);margin-bottom:24px}
.cst{display:flex;gap:12px;margin-bottom:32px;width:100%}
.sb{flex:1;background:rgba(255,255,255,0.07);border-radius:14px;padding:16px 8px;border:1px solid rgba(255,255,255,0.1);text-align:center}
.sn{font-size:24px;font-weight:900;color:var(--yellow)}
.sl{font-size:11px;color:rgba(255,255,255,0.45);margin-top:4px}
.btn{width:100%;padding:15px;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;margin-bottom:10px;font-family:inherit;transition:transform .15s}
.btn:active{transform:scale(0.97)}
.btnb{background:var(--blue);color:#fff}
.btng{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.75);border:1px solid rgba(255,255,255,0.18)}

/* FLIP */
.fcard{background:var(--blue);border-radius:12px;min-height:70px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:800;color:#fff;text-align:center;padding:6px;transition:all .3s;word-break:keep-all;line-height:1.3;border:2px solid transparent}
.fcard.open{background:var(--card);color:var(--text);border-color:var(--blue)}
.fcard.matched{background:rgba(52,199,89,0.15);color:var(--green);border-color:var(--green);pointer-events:none}
.fcard.wrong{background:rgba(255,59,48,0.15);border-color:var(--red)}

/* CONFETTI */
.cfw{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden;z-index:999}
.cfp{position:absolute;border-radius:2px;animation:cff 2.5s ease-in forwards}
@keyframes cff{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <div class="home-header">
    <span class="flag">🇰🇷</span>
    <h1>한국어 солонгос хэл</h1>
    <p class="sub">үг цээжлэх хэцүү биш</p>
    <div class="pb-wrap"><div class="pb-fill" id="pbf" style="width:0%"></div></div>
    <p class="pb-text" id="pbt">0 / 12 хичээл дууссан</p>
  </div>
  <div class="lessons" id="lc"></div>
</div>

<!-- LESSON SCREEN -->
<div id="lesson" class="screen">
  <div class="ltb">
    <button class="bbtn" id="backBtn">←</button>
    <div class="linfo">
      <div class="lname" id="ltitle">Хичээл</div>
      <div class="lptext" id="lptext"></div>
    </div>
    <div class="xpb" id="xpb">⭐ 10 XP</div>
  </div>
  <div class="lpbar"><div class="lpfill" id="lpfill" style="width:0%"></div></div>

  <!-- Match panel -->
  <div id="mg" class="gpanel">
    <div class="gi">🔗 Тохирох үгийг холбоорой</div>
    <div class="ri" id="ri">0 / 5 тохирсон</div>
    <div class="mcols"><div class="mcol" id="ck"></div><div class="mcol" id="cm"></div></div>
  </div>

  <!-- Choice panel -->
  <div id="mcg" class="gpanel">
    <div class="mc-prog" id="mc-prog">1 / 20</div>
    <div class="mc-card">
      <div class="mc-q" id="mc-q"></div>
      <div class="mc-hint" id="mc-hint">Монгол утгыг сонгоорой</div>
    </div>
    <div class="mc-opts" id="mc-opts"></div>
  </div>

  <!-- Typer panel -->
  <div id="tpg" class="gpanel">
    <div class="tp-prog" id="tp-prog">1 / 15</div>
    <div class="tp-card">
      <div class="tp-mn" id="tp-mn"></div>
      <div class="tp-disp" id="tp-disp"></div>
    </div>
    <div class="tp-btns" id="tp-btns"></div>
  </div>

  <!-- Flip panel -->
  <div id="flg" class="gpanel">
    <div id="fl-prog" style="text-align:center;font-size:13px;color:var(--text2)"></div>
    <div style="text-align:center;font-size:14px;font-weight:700;color:var(--text2)">🃏 Хос картыг олоорой</div>
    <div id="fl-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1"></div>
  </div>
</div>

<!-- COMPLETE SCREEN -->
<div id="complete" class="screen">
  <div class="cfw" id="cfw"></div>
  <div class="ce">🎉</div>
  <h2 class="ct">Маш сайн!</h2>
  <p class="cs" id="csub">Хичээлийг дууслаа!</p>
  <div class="cst">
    <div class="sb"><div class="sn" id="sxp">+10</div><div class="sl">XP оноо</div></div>
    <div class="sb"><div class="sn" id="smt">0/0</div><div class="sl">Зөв хариулт</div></div>
    <div class="sb"><div class="sn" id="stm">0с</div><div class="sl">Хугацаа</div></div>
  </div>
  <button class="btn btnb" id="nextBtn">Дараагийн хичээл →</button>
  <button class="btn btng" id="homeBtn2">Нүүр хуудас</button>
</div>

var ST = {done:[], xp:0};
try {
  ST.done = JSON.parse(localStorage.getItem('kd') || '[]');
  ST.xp   = parseInt(localStorage.getItem('kx') || '0') || 0;
} catch(e) {}

var CL = null;   // current lesson
var MS = {};     // match session stats

function save() {
  try {
    localStorage.setItem('kd', JSON.stringify(ST.done));
    localStorage.setItem('kx', String(ST.xp));
  } catch(e) {}
}

// ── UTILS ──────────────────────────────────────────────
function shuf(a) {
  var b = a.slice();
  for (var i = b.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showPanel(id) {
  document.querySelectorAll('.gpanel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

// ── HOME ───────────────────────────────────────────────
function renderHome() {
  var tot = LESSONS.length;
  var dn  = ST.done.length;
  document.getElementById('pbf').style.width = (dn/tot*100) + '%';
  document.getElementById('pbt').innerText   = dn + ' / ' + tot + ' хичээл дууссан';

  var lc = document.getElementById('lc');

  LESSONS.forEach(function(les) {

// ── START LESSON ────────────────────────────────────────
function startLesson(les) {
  CL = les;
  MS = {correct:0, total:0, wrong:0, start:Date.now()};

  document.getElementById('ltitle').innerText = les.title;
  document.getElementById('lptext').innerText = les.sub;
  document.getElementById('xpb').innerText    = '⭐ ' + les.xp + ' XP';
  document.getElementById('lpfill').style.width = '0%';

  showScreen('lesson');

  if (les.game === 'match') {
    showPanel('mg');
    startMatch();
  } else if (les.game === 'typer') {
    showPanel('tpg');
    startTyper();
  } else if (les.game === 'flip') {
    showPanel('flg');
    startFlip();
  } else {
    showPanel('mcg');
    startChoice();
  }
}

// ── MATCH GAME ─────────────────────────────────────────
var MG = {};

function startMatch() {
  MG = {seen:[], selK:null, selM:null, done:0, total:0, wrong:0, pairs:[]};
  loadMatchRound();
}

function loadMatchRound() {
  var remaining = CL.w.filter(function(p) { return MG.seen.indexOf(p.k) < 0; });
  if (remaining.length === 0) { finishLesson(); return; }

  var pool = shuf(remaining).slice(0, 5);
  MG.pairs = pool;
  MG.done  = 0;
  MG.total = pool.length;
  MS.total += pool.length;

  document.getElementById('ri').innerText = '0 / ' + pool.length + ' тохирсон';
  document.getElementById('lpfill').style.width = '0%';

  var ks  = shuf(pool.map(function(p){ return p.k; }));
  var ms  = shuf(pool.map(function(p){ return p.m; }));
  var ck  = document.getElementById('ck'); ck.innerHTML = '';
  var cm  = document.getElementById('cm'); cm.innerHTML = '';

  ks.forEach(function(k) {
    var d = document.createElement('div');
    d.className   = 'mcard';
    d.innerText   = k;
    d.dataset.val = k;
    d.dataset.typ = 'k';
    d.addEventListener('click', function(){ clickMatch(d); });
    ck.appendChild(d);
  });
  ms.forEach(function(m) {
    var d = document.createElement('div');
    d.className   = 'mcard';
    d.innerText   = m;
    d.dataset.val = m;
    d.dataset.typ = 'm';
    d.addEventListener('click', function(){ clickMatch(d); });
    cm.appendChild(d);
  });
}

function clickMatch(el) {
  if (el.classList.contains('ok') || el.classList.contains('err')) return;
  var typ = el.dataset.typ;

  if (typ === 'k') {
    if (MG.selK) MG.selK.classList.remove('sel');
    MG.selK = el;
    el.classList.add('sel');
  } else {
    if (MG.selM) MG.selM.classList.remove('sel');
    MG.selM = el;
    el.classList.add('sel');
  }

  if (!MG.selK || !MG.selM) return;

  var kv = MG.selK.dataset.val;
  var mv = MG.selM.dataset.val;
  var ok = MG.pairs.some(function(p){ return p.k === kv && p.m === mv; });

  if (ok) {
    MG.selK.classList.remove('sel'); MG.selK.classList.add('ok');
    MG.selM.classList.remove('sel'); MG.selM.classList.add('ok');
    MG.done++; MS.correct++;
    MG.selK = null; MG.selM = null;

    document.getElementById('ri').innerText = MG.done + ' / ' + MG.total + ' тохирсон';
    document.getElementById('lpfill').style.width = (MG.done / MG.total * 100) + '%';

    if (MG.done === MG.total) {
      MG.pairs.forEach(function(p){ MG.seen.push(p.k); });
      setTimeout(function() { loadMatchRound(); }, 600);
    }
  } else {
    MG.wrong++; MS.wrong++;
    var sk = MG.selK, sm = MG.selM;
    sk.classList.add('err'); sm.classList.add('err');
    MG.selK = null; MG.selM = null;
    setTimeout(function() {
      sk.classList.remove('sel','err');
      sm.classList.remove('sel','err');
    }, 500);
  }
}

// ── CHOICE GAME ────────────────────────────────────────
var CG = {};

function startChoice() {
  CG = {items: shuf(CL.w).slice(0, 20), idx: 0, wrong: 0};
  MS.total = CG.items.length;
  showChoice();
}

function showChoice() {
  if (CG.idx >= CG.items.length) { MS.wrong = CG.wrong; finishLesson(); return; }
  var item = CG.items[CG.idx];
  var tot  = CG.items.length;

  document.getElementById('mc-prog').innerText = (CG.idx+1) + ' / ' + tot;
  document.getElementById('lpfill').style.width = (CG.idx / tot * 100) + '%';
  document.getElementById('mc-q').innerText    = item.k;
  document.getElementById('mc-hint').innerText = 'Монгол утгыг сонгоорой';

  var others = CG.items.filter(function(x){ return x !== item; });
  var wrongs = shuf(others).slice(0, 3);
  var opts   = shuf([item].concat(wrongs));

  var oc = document.getElementById('mc-opts');
  oc.innerHTML = '';
  opts.forEach(function(o) {
    var btn = document.createElement('div');
    btn.className = 'mc-opt';
    btn.innerText = o.m;
    btn.addEventListener('click', function() {
      if (btn.classList.contains('correct') || btn.classList.contains('wrong')) return;
      if (o === item) {
        btn.classList.add('correct');
        MS.correct++;
        setTimeout(function() { CG.idx++; showChoice(); }, 650);
      } else {
        btn.classList.add('wrong');
        CG.wrong++; MS.wrong++;
        // dim all others
        oc.querySelectorAll('.mc-opt').forEach(function(b){ if(b!==btn) b.classList.add('dim'); });
        setTimeout(function() { CG.idx++; showChoice(); }, 1000);
      }
    });
    oc.appendChild(btn);
  });
}

// ── TYPER GAME ─────────────────────────────────────────
var TP = {};

function startTyper() {
  TP = {items: shuf(CL.w).slice(0, 15), idx: 0, wrong: 0};
  MS.total = TP.items.length;
  showTyper();
}

function showTyper() {
  if (TP.idx >= TP.items.length) { MS.wrong = TP.wrong; finishLesson(); return; }
  var item  = TP.items[TP.idx];
  var chars = Array.from(item.k);

  document.getElementById('tp-prog').innerText  = (TP.idx+1) + ' / ' + TP.items.length;
  document.getElementById('lpfill').style.width = (TP.idx / TP.items.length * 100) + '%';
  document.getElementById('tp-mn').innerText    = item.m;
  document.getElementById('tp-disp').innerText  = '';

  // typedCount: хэдэн тэмдэгт зөв оруулсан
  var typedCount = 0;
  var container  = document.getElementById('tp-btns');
  container.innerHTML = '';

  // Товч бүрийг original index-ээр үүсгэж, дараа нь shuffle хийж харуулна
  var allBtns = chars.map(function(ch, origIdx) {
    var b = document.createElement('button');
    b.className = 'tp-btn';
    b.innerText = ch;
    b.addEventListener('click', function() {
      if (b.disabled) return;
      if (ch === chars[typedCount]) {
        // Зөв товч
        typedCount++;
        b.disabled = true;
        b.style.borderColor = 'var(--green)';
        b.style.color = 'var(--green)';
        document.getElementById('tp-disp').innerText = chars.slice(0, typedCount).join('');
        if (typedCount === chars.length) {
          MS.correct++;
          setTimeout(function() { TP.idx++; showTyper(); }, 600);
        }
      } else {
        // Буруу товч
        TP.wrong++; MS.wrong++;
        b.style.borderColor = 'var(--red)';
        b.style.color = 'var(--red)';
        setTimeout(function() {
          if (!b.disabled) {
            b.style.borderColor = 'var(--border)';
            b.style.color = 'var(--text)';
          }
        }, 400);
      }
    });
    return b;
  });

  shuf(allBtns).forEach(function(b) { container.appendChild(b); });
}

// ── FLIP GAME ──────────────────────────────────────────
var FL = {pairs:null,cards:[],first:null,second:null,matched:0,wrong:0,locked:false};

function startFlip(){
  FL.pairs=shuf(CL.w).slice(0,8);
  FL.first=null;FL.second=null;FL.matched=0;FL.wrong=0;FL.locked=false;
  MS.total=FL.pairs.length;
  var items=[];
  FL.pairs.forEach(function(p){
    items.push({val:p.k,pair:p.k,type:'k'});
    items.push({val:p.m,pair:p.k,type:'m'});
  });
  items=shuf(items);
  FL.cards=items;
  var grid=document.getElementById('fl-grid');grid.innerHTML='';
  document.getElementById('fl-prog').innerText='0 / '+FL.pairs.length+' хос олдсон';
  document.getElementById('lpfill').style.width='0%';
  items.forEach(function(item,i){
    var d=document.createElement('div');
    d.className='fcard';
    d.dataset.idx=i;
    d.dataset.pair=item.pair;
    d.dataset.type=item.type;
    d.innerText='?';
    d.onclick=function(){clickFlip(d,item);};
    grid.appendChild(d);
  });
}

function clickFlip(el,item){
  if(FL.locked||el.classList.contains('matched')||el.classList.contains('open'))return;
  el.classList.add('open');
  el.innerText=item.val;
  if(!FL.first){FL.first={el:el,item:item};return;}
  FL.second={el:el,item:item};
  FL.locked=true;
  var a=FL.first,b=FL.second;
  if(a.item.pair===b.item.pair&&a.item.type!==b.item.type){
    a.el.classList.add('matched');b.el.classList.add('matched');
    FL.matched++;MS.correct++;
    document.getElementById('fl-prog').innerText=FL.matched+' / '+FL.pairs.length+' хос олдсон';
    document.getElementById('lpfill').style.width=(FL.matched/FL.pairs.length*100)+'%';
    FL.first=null;FL.second=null;FL.locked=false;
    if(FL.matched===FL.pairs.length){MS.wrong=FL.wrong;setTimeout(finishLesson,600);}
  } else {
    FL.wrong++;
    a.el.classList.add('wrong');b.el.classList.add('wrong');
    setTimeout(function(){
      a.el.classList.remove('open','wrong');a.el.innerText='?';
      b.el.classList.remove('open','wrong');b.el.innerText='?';
      FL.first=null;FL.second=null;FL.locked=false;
    },1000);
  }
}

// ── FINISH ─────────────────────────────────────────────
function finishLesson() {
  if (ST.done.indexOf(CL.id) < 0) {
    ST.done.push(CL.id);
    ST.xp += CL.xp;
    save();
  }
  var sec = Math.round((Date.now() - MS.start) / 1000);
  document.getElementById('csub').innerText = CL.title + ' дууслаа!';
  document.getElementById('sxp').innerText  = '+' + CL.xp;
  document.getElementById('smt').innerText  = MS.correct + '/' + MS.total;
  document.getElementById('stm').innerText  = sec + 'с';
  confetti();
  showScreen('complete');
}

function nextLesson() {
  var idx = LESSONS.findIndex(function(l){ return l.id === CL.id; });
  if (idx >= 0 && idx < LESSONS.length-1) { startLesson(LESSONS[idx+1]); }
  else { goHome(); }
}

function confetti() {
  var fw = document.getElementById('cfw'); fw.innerHTML = '';
  var colors = ['#FF6B6B','#4ECDC4','#FFCC00','#A29BFE','#FD79A8','#00B894'];
  for (var i = 0; i < 60; i++) {
    var p = document.createElement('div');
    p.className = 'cfp';
    var sz = 6 + Math.random()*8;
    p.style.cssText = 'left:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;background:'
      +colors[Math.floor(Math.random()*colors.length)]+';animation-delay:'+Math.random()*1.5+'s';
    fw.appendChild(p);
  }
}

document.getElementById('nextBtn').addEventListener('click', function(){ nextLesson(); });

renderHome();
